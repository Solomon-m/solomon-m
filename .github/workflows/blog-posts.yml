name: Sync Latest Blog Posts

on:
  schedule:
    - cron: '50 0 * * *'   # Runs every day at 6:50 AM UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  update-readme:
    name: Update README with latest posts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch & inject blog posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://solomonmark.dev/rss.xml"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST
          template: "- [$title]($url) &nbsp;·&nbsp; $date"
          date_format: "MMM DD, YYYY"
          commit_message: "chore: sync latest blog posts from solomonmark.dev"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
