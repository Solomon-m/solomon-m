name: Sync Latest Blog Posts

on:
  schedule:
    - cron: "0 6 * * *" # Runs every day at 6:00 AM UTC
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update-readme:
    name: Update README with latest posts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & inject blog posts
        run: node .github/scripts/update-blog-posts.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "chore: sync latest blog posts from solomonmark.dev" && git push)
